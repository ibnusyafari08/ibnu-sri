<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Ibnu & Sri</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Cinzel:wght@400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section class="hero-jawa">
        <div class="wayang-ornament left-wayang"></div>
        <div class="wayang-ornament right-wayang"></div>

        <div class="container d-flex align-items-center justify-content-center min-vh-100">
            <div class="row w-100 justify-content-center text-center">
                <div class="col-12 col-md-10 hero-content">
                    
                    <div class="fade-in">
                        <p class="the-wedding-of gold-text">The Wedding Of</p>
                        <h1 class="couple-names gold-gradient">Ibnu & Sri</h1>
                        
                        <p class="invite-intro">
                            Kami mengundang Anda untuk hadir dan memberikan doa restu pada momen bahagia kami.
                        </p>
                    </div>

                    <div class="guest-area fade-in">
                        <p class="recipient-label">Kepada Yth. Bapak/Ibu/Saudara/i:</p>
                        
                        <div class="name-box-jawa shadow-lg">
                            <h2 id="guest-name" class="display-name gold-text">Nama Tamu</h2>
                        </div>
                        
                        <p class="disclaimer-text">
                            *Mohon maaf apabila ada kesalahan penulisan nama dan gelar
                        </p>
                    </div>

                    <div class="mt-5 fade-in">
                        <a href="#home" class="btn btn-gold-jawa shadow">
                            Buka Undangan
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
